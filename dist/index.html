<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Premium day spa in Bloemfontein. Massages, nails, facials, waxing & body treatments at Harmony @ Hana.">
  <title>Harmony @ Hana — Day Spa Bloemfontein</title>
  <link rel="stylesheet" href="./client/assets/styles-DqIPEx-k.css">
  <style>
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    #root { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    console.log('=== TanStack Start App Boot ===');
    
    // Set up environment for SSR-compiled client code
    window.__INITIAL_STATE__ = { dehydrated: {} };
    
    try {
      console.log('Loading client bundle...');
      const bundle = await import('./client/assets/index-jjFQKNax.js');
      console.log('✓ Bundle loaded');
      console.log('Available exports:', Object.keys(bundle));
      
      // Try to find and execute the app entry point
      if (bundle.default) {
        console.log('Found default export, attempting to initialize...');
        await bundle.default();
      } else if (bundle.start) {
        console.log('Found start export, attempting to initialize...');
        await bundle.start();
      } else {
        console.log('Module loaded but no entry point found');
        console.log('Attempting to render with React...');
      }
      
    } catch (err) {
      console.error('=== Boot Error ===');
      console.error('Error:', err.message);
      console.error('Type:', err.constructor.name);
      console.error('Stack:', err.stack);
      
      // Show error in UI
      const root = document.getElementById('root');
      root.innerHTML = `
        <div style="
          height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          font-family: monospace;
          background: #f5f5f5;
          padding: 20px;
        ">
          <div style="max-width: 600px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1)">
            <h2 style="color: #d32f2f; margin-top: 0">Application Error</h2>
            <p><strong>Error Type:</strong> ${err.constructor.name}</p>
            <p><strong>Message:</strong></p>
            <pre style="background: #f5f5f5; padding: 10px; border-left: 3px solid #d32f2f; overflow-x: auto">${err.message}</pre>
            <p style="color: #666; font-size: 12px">This app requires server-side rendering. Consider deploying to Cloudflare Workers instead of Netlify.</p>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
